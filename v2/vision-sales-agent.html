<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>(function(){try{var t=localStorage.getItem('i3_theme');if(t!=='light'&&t!=='dark')t=(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
<title>Vision · i3 Sales Agent</title>
<style>
  /* i3 Brand Kit: Brand Blue #00588F · Dark Blue #002447 · Pink #DF1E71 · Green #00A661 · Yellow #FFC107 · Helvetica Neue */
  :root{
    --brand:#00588F;--brand-700:#024d7c;--brand-900:#002447;
    --pink:#DF1E71;--green:#00A661;--yellow:#FFC107;--red:#C8102E;
    --ink:#0d1b2a;--ink2:#33424f;--muted:#69788a;--line:#dfe6ee;--bg:#eef2f6;--panel:#fff;
    --inbg:#e8f1f8;--inbd:#bcd9ee;--okbg:#e7f8f0;--okbd:#a6e8c8;--wnbg:#fff7e0;--wnbd:#ffe39c;--hibg:#fdebef;--hibd:#f4b8c3;color-scheme:light;
  }
  :root[data-theme="dark"]{--ink:#eaf2f9;--ink2:#c8dbec;--muted:#8298ad;--line:#1d3c59;--bg:#0a1a2b;--panel:#0f2438;--inbg:#12314c;--inbd:#26496c;--okbg:rgba(0,166,97,.12);--okbd:rgba(0,166,97,.34);--wnbg:rgba(255,193,7,.13);--wnbd:rgba(255,193,7,.36);--hibg:rgba(223,30,113,.13);--hibd:rgba(223,30,113,.4);color-scheme:dark;}
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
  .themebtn{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.10);color:#fff;font-size:15px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:.15s;font-family:inherit}
  .themebtn:hover{background:rgba(255,255,255,.2)}
  /* dark-mode surface remaps (brand accents stay constant) */
  [data-theme="dark"] .vsay .bub,[data-theme="dark"] .kv,[data-theme="dark"] .doc,[data-theme="dark"] .upload,[data-theme="dark"] .btn.g,[data-theme="dark"] .badge.lock,[data-theme="dark"] .chk{background:var(--inbg)}
  [data-theme="dark"] table.tbl td{border-bottom-color:var(--line)}
  [data-theme="dark"] .ti{border-bottom-color:var(--line)}
  [data-theme="dark"] .sp{border-color:var(--inbd)}
  [data-theme="dark"] .thinking,[data-theme="dark"] .chip,[data-theme="dark"] .back{color:#6cc0f5}
  [data-theme="dark"] select:focus,[data-theme="dark"] input:focus,[data-theme="dark"] textarea:focus{border-color:#2f9bde;box-shadow:0 0 0 3px rgba(47,155,222,.25)}
  [data-theme="dark"] .wdg:hover,[data-theme="dark"] .stage:hover{border-color:#2f9bde}
  [data-theme="dark"] .wdg .v.good{color:#5fd6a0}
  [data-theme="dark"] .badge.ok{color:#5fd6a0}
  [data-theme="dark"] .wdg .v.warn,[data-theme="dark"] .badge.warn{color:#f0b93d}
  [data-theme="dark"] [style*="color:#8a5d05"]{color:#f0b93d !important}
  [data-theme="dark"] select,[data-theme="dark"] input,[data-theme="dark"] textarea{background:var(--inbg);color:var(--ink);border-color:var(--inbd)}
  [data-theme="dark"] input::placeholder,[data-theme="dark"] textarea::placeholder{color:var(--muted)}
  .ilogo svg{height:100%;width:auto;display:block}.ilogo svg path{fill:#fff}
  .topbar{background:var(--brand-900);color:#fff;display:flex;align-items:center;gap:12px;padding:11px 20px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
  .topbar .ilogo{height:23px}.topbar .sep{width:1px;height:20px;background:rgba(255,255,255,.2)}
  .topbar .prod{font-weight:800;letter-spacing:.4px}.topbar .prod small{display:block;font-weight:400;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#7fc4ef}
  .topbar .right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .roleSel{display:flex;border:1px solid rgba(255,255,255,.25);border-radius:9px;overflow:hidden}
  .roleSel button{background:transparent;color:#cfe3f1;border:none;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
  .roleSel button.on{background:var(--brand);color:#fff}
  .pill{font-size:11px;font-weight:700;border-radius:999px;padding:5px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:#dceaf5}
  .vbtn{font-size:11px;font-weight:700;border-radius:999px;padding:5px 11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:#dceaf5;cursor:pointer}
  .vbtn.on{background:var(--pink);border-color:var(--pink);color:#fff}

  .wrap{max-width:1080px;margin:0 auto;padding:22px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--pink);font-weight:700}
  h1{font-size:26px;margin:6px 0 4px;font-weight:800;letter-spacing:-.3px}
  .lede{color:var(--ink2);font-size:14.5px;line-height:1.55;max-width:660px}
  .vsay{display:flex;gap:11px;align-items:flex-start;margin:14px 0}
  .vsay .av{flex:none;width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 50% 35%,#0e6fb0,var(--brand-900));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;position:relative}
  .vsay .bub{background:#f1f6fa;border:1px solid var(--line);border-radius:13px;border-top-left-radius:4px;padding:11px 14px;font-size:14px;line-height:1.5}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px}
  .card .h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .card .h .ic{width:38px;height:38px;border-radius:10px;background:var(--inbg);border:1px solid var(--inbd);display:flex;align-items:center;justify-content:center;font-size:18px}
  .card .h h2{margin:0;font-size:16px;font-weight:800}.card .h .sub{font-size:12px;color:var(--muted);margin-top:1px}
  .body{padding:18px}
  label.f{display:block;margin-bottom:13px}
  label.f .l{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2);margin-bottom:6px;display:block}
  select,input,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  textarea{min-height:90px;resize:vertical}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,88,143,.12)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}@media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chk{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .chk.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn{border:none;border-radius:11px;padding:11px 17px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit}
  .btn.p{background:var(--brand);color:#fff}.btn.p:hover{background:var(--brand-700)}
  .btn.pink{background:var(--pink);color:#fff}.btn.g{background:#eef2f7;color:var(--ink2)}
  .btn.sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
  .upload{border:1.5px dashed var(--line);border-radius:12px;padding:16px;text-align:center;background:#fafcfe}
  .upload .di{font-size:24px}.upload .dt{font-size:13px;color:var(--muted);margin:7px auto 12px;max-width:440px;line-height:1.5}

  .thinking{display:flex;align-items:center;gap:11px;color:var(--brand);font-weight:700;font-size:14px;padding:6px 0}
  .sp{width:20px;height:20px;border-radius:50%;border:2.5px solid #cfe0ee;border-top-color:var(--brand);animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .osec{margin-bottom:16px}
  .osec h4{margin:0 0 8px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--pink);font-weight:700}
  .kv{background:#f6f9fc;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .kv .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .kv .v{font-size:13.5px;font-weight:700;margin-top:2px}
  ol.steps,ul.steps{margin:0;padding-left:18px;font-size:13.5px;line-height:1.6}ol.steps li,ul.steps li{margin-bottom:5px}
  .doc{white-space:pre-wrap;background:#f6f9fc;border:1px solid var(--line);border-radius:10px;padding:13px;font-size:12.8px;line-height:1.55;color:var(--ink2)}
  .badge{display:inline-block;font-size:11px;font-weight:800;border-radius:999px;padding:3px 10px}
  .badge.ok{background:var(--okbg);color:#0a7d4f;border:1px solid var(--okbd)}
  .badge.warn{background:var(--wnbg);color:#8a5d05;border:1px solid var(--wnbd)}
  .badge.hi{background:var(--hibg);color:var(--red);border:1px solid var(--hibd)}
  .badge.lock{background:#eef2f7;color:var(--ink2);border:1px solid var(--line)}
  .chip{display:inline-block;font-size:11.5px;font-weight:700;border-radius:999px;padding:3px 10px;margin:0 5px 5px 0;background:var(--inbg);color:var(--brand);border:1px solid var(--inbd)}
  table.tbl{width:100%;border-collapse:collapse;font-size:13px}
  table.tbl th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:7px 9px;border-bottom:1px solid var(--line)}
  table.tbl td{padding:8px 9px;border-bottom:1px solid #eef2f6}
  table.tbl tr:last-child td{border-bottom:none}
  .ent{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center}
  @media(max-width:640px){.ent{grid-template-columns:1fr 1fr}}

  /* dashboard */
  .greet{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .adminbar{background:linear-gradient(120deg,var(--brand-900),var(--brand));color:#fff;border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:14px 0}
  .adminbar .t{font-size:13.5px}.adminbar b{font-weight:800}
  .widgets{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:12px 0}
  @media(max-width:860px){.widgets{grid-template-columns:1fr 1fr}}
  .wdg{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:.14s}
  .wdg:hover{border-color:var(--brand);box-shadow:0 8px 20px rgba(0,40,75,.08);transform:translateY(-2px)}
  .wdg .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700}
  .wdg .v{font-size:23px;font-weight:800;margin-top:5px}
  .wdg .s{font-size:11.5px;color:var(--muted);margin-top:3px}
  .wdg .v.good{color:var(--green)}.wdg .v.warn{color:#b9770b}
  .wdg.act{border-left:3px solid var(--pink)}
  .today{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 16px;margin-bottom:14px}
  .ti{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px dashed #eef2f6;font-size:13.5px}
  .ti:last-child{border-bottom:none}
  .ti .dot{flex:none;width:9px;height:9px;border-radius:50%}
  .ti .nudge{margin-left:auto}
  .drill{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:0;margin-bottom:16px;overflow:hidden;display:none}
  .drill.show{display:block}
  .drill .dh{padding:13px 16px;border-bottom:1px solid var(--line);font-weight:800;display:flex;justify-content:space-between;align-items:center}

  .stages{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
  @media(max-width:820px){.stages{grid-template-columns:1fr 1fr}}@media(max-width:520px){.stages{grid-template-columns:1fr}}
  .stage{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:15px;cursor:pointer;transition:.14s;position:relative}
  .stage:hover{border-color:var(--brand);box-shadow:0 8px 22px rgba(0,40,75,.1);transform:translateY(-2px)}
  .stage .ic{width:40px;height:40px;border-radius:11px;background:var(--inbg);border:1px solid var(--inbd);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:10px}
  .stage h3{margin:0 0 3px;font-size:15px;font-weight:800}.stage p{margin:0;font-size:12px;color:var(--muted);line-height:1.4}
  .stage .step{position:absolute;top:13px;right:14px;font-size:11px;font-weight:800;color:#9fb8cf}
  .stage.locked{opacity:.55;cursor:not-allowed}.stage.locked:hover{transform:none;box-shadow:none;border-color:var(--line)}
  .lock{position:absolute;top:13px;right:14px;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  .back{background:none;border:none;color:var(--brand);font-weight:700;font-size:13.5px;cursor:pointer;padding:0;margin-bottom:14px}
  .saveNote{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2);background:var(--inbg);border:1px solid var(--inbd);border-radius:10px;padding:9px 12px;margin-top:14px}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.6}
  .hidden{display:none}
</style>
</head>
<body>
<div class="topbar">
  <div class="ilogo" id="logo" onclick="goPortal()" style="cursor:pointer" title="Back to portal"></div><div class="sep"></div>
  <div class="prod"><span style="color:var(--pink)">V</span>ision<small>i3 Sales Agent</small></div>
  <div class="right">
    <button id="themeToggle" class="themebtn" type="button" onclick="toggleTheme()" title="Toggle light / dark" aria-label="Toggle light or dark mode">🌙</button>
    <div class="roleSel">
      <button id="ro-admin" onclick="setRole('admin')">Admin</button>
      <button class="on" id="ro-rep" onclick="setRole('rep')">i3 Rep</button>
      <button id="ro-integ" onclick="setRole('integ')">Integrator</button>
      <button id="ro-partner" onclick="setRole('partner')">Partner</button>
    </div>
    <span class="pill" id="segPill">Retail</span>
  </div>
</div>

<div class="wrap">
  <!-- ADMIN -->
  <div id="view-admin" class="hidden"></div>
  <!-- DASHBOARD (home) -->
  <div id="view-home"></div>
  <!-- STAGE -->
  <div id="view-stage" class="hidden">
    <button class="back" onclick="goHome()">← Back to dashboard</button>
    <div class="card">
      <div class="h"><div class="ic" id="stIc"></div><div><h2 id="stName"></h2><div class="sub" id="stSub"></div></div></div>
      <div class="body">
        <div class="vsay"><div class="av" id="stAv">V</div><div class="bub" id="stIntro"></div></div>
        <div id="stInputs"></div>
        <div id="stRun" style="margin-top:6px"></div>
        <div id="stOut"></div>
      </div>
    </div>
  </div>
  <div class="foot">Working model / simulation — outputs are illustrative. Runs inside i3Host; not public. Data entered is saved to Salesforce and is proprietary to i3. © 2026 i3 International Inc.</div>
</div>

(function(){var b=document.getElementById('themeToggle');if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';})();

function setRole(r){ S.role=r;

function show(id){ ['admin','home','stage'].forEach(function(v){document.getElementById('view-'+v).classList.toggle('hidden',v!==id)}); window.scrollTo(0,0); }

function wdg(id,k,v,s,cls,extra){ return '<div class="wdg '+(extra||'')+'" onclick="drill(\''+id+'\')"><div class="k">'+k+'</div><div class="v '+(cls||'')+'">'+v+'</div><div class="s">'+s+'</div></div>'; }
function ti(color,txt,label,stage){ return '<div class="ti"><span class="dot" style="background:'+color+'"></span>'+txt+'<button class="btn p sm nudge" onclick="openStage(\''+stage+'\')">'+label+' →</button></div>'; }

function drill(type){
  var d=document.getElementById('drill'); var html='';

    html='<div class="dh">Your pipeline <button class="btn g sm" onclick="closeDrill()">✕</button></div><div class="body">'+

      row2('Northline Stores','Presentation','Manager invited','Prep deck','present')+
      row2('Harbour Retail Co.','POC','Day 20 / 45','Review','poc')+
      '</table></div>';

    html='<div class="dh">Numbers <button class="btn g sm" onclick="closeDrill()">✕</button></div><div class="body"><div class="grid2">'+

function row2(a,s,st,act,stage){ return '<tr><td><b>'+a+'</b></td><td>'+s+'</td><td>'+st+'</td><td style="text-align:right"><button class="btn p sm" onclick="openStage(\''+stage+'\')">'+act+' →</button></td></tr>'; }

function stage(id){return STAGES.find(function(s){return s.id===id})}
function renderStages(){
  document.getElementById('stages').innerHTML=STAGES.map(function(s){
    var ok=allowed(s);
    return '<div class="stage '+(ok?'':'locked')+'" '+(ok?'onclick="openStage(\''+s.id+'\')"':'')+'>'+
      (ok?'<div class="step">'+s.n+'</div>':'<div class="lock">i3 / integrator</div>')+
      '<div class="ic">'+s.ic+'</div><h3>'+s.nm+'</h3><p>'+s.sub+'</p></div>';
  }).join('');
}
function openStage(id){
  var s=stage(id); if(!allowed(s)) return;
  show('stage');
  document.getElementById('stIc').textContent=s.ic; document.getElementById('stName').textContent=s.nm;
  document.getElementById('stSub').textContent=s.sub; document.getElementById('stIntro').textContent=s.intro;
  document.getElementById('stOut').innerHTML=''; document.getElementById('stRun').innerHTML='';
  renderInputs(id); window.scrollTo(0,0);
}

function runStage(id){
  var run=document.getElementById('stRun'),out=document.getElementById('stOut');
  run.innerHTML='<div class="thinking"><span class="sp"></span><span id="thinkTxt">Vision is thinking…</span></div>'; out.innerHTML='';
  var lines=THINK[id]||["Working…"]; var i=0;
  var t=setInterval(function(){ i++; var e=document.getElementById('thinkTxt'); if(e&&i<lines.length)e.textContent=lines[i];
    if(i>=lines.length){ clearInterval(t); run.innerHTML=''; out.innerHTML=OUTPUT[id](); out.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  },560);
}

  close:["setting the POC decision deadline…","driving the Go / No-Go","lining up follow-up & rollout","matching training — Lean + Grade","scoping professional services","surfacing upsell options"],
  onboard:["parsing onboarding plan…","mapping training + mentors","scheduling reflections"]
};

/* ===== helpers ===== */
function kv(k,v){return '<div class="kv"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>';}
function sec(t,inner){return '<div class="osec"><h4>'+t+'</h4>'+inner+'</div>';}
function saveBar(extra){return '<div class="saveNote">🔒 Saved to Salesforce · proprietary to i3'+(extra?' — '+extra:'')+'</div>';}
var ASSOC={Retail:["NRF","RILA"],Grocery:["FMI","NGA"],QSR:["National Restaurant Assoc."],Commercial:["ASIS","SIA"],School:["Campus Safety / NaBITA"]};
/* address -> exact legal requirement */
function lawFromAddress(a){a=(a||'').toLowerCase();
  if(/quebec|québec|montr|\bqc\b/.test(a)) return {juris:'Quebec, Canada', laws:['Quebec Law 25','PIPEDA'], doc:'Law 25 PIA + express biometric consent + bilingual (FR/EN) signage'};
  if(/alberta|\bab\b|calgary|edmonton/.test(a)) return {juris:'Alberta, Canada', laws:['PIPA (AB)','PIPEDA'], doc:'PIPA / PIPEDA PIA + signage'};
  if(/british columbia|\bbc\b|vancouver/.test(a)) return {juris:'British Columbia, Canada', laws:['PIPA (BC)','PIPEDA'], doc:'PIPA / PIPEDA PIA + signage'};
  if(/ontario|toronto|ottawa|\bon\b/.test(a)) return {juris:'Ontario, Canada', laws:['PIPEDA'], doc:'PIPEDA PIA + purpose-specific signage'};
  if(/illinois|chicago|\bil\b/.test(a)) return {juris:'Illinois, USA', laws:['BIPA'], doc:'BIPA written consent (biometrics) + retention schedule'};
  if(/california|\bca\b|los angeles|san francisco/.test(a)) return {juris:'California, USA', laws:['CCPA / CPRA'], doc:'CCPA notice at collection + opt-out'};
  if(/texas|\btx\b|dallas|houston/.test(a)) return {juris:'Texas, USA', laws:['CUBI (TX)'], doc:'Texas CUBI biometric notice + consent'};
  if(/united kingdom|\buk\b|london|england/.test(a)) return {juris:'United Kingdom', laws:['UK GDPR'], doc:'DPIA + lawful basis + signage'};
  if(/france|germany|spain|italy|europe|\beu\b|paris|berlin|madrid/.test(a)) return {juris:'European Union', laws:['GDPR'], doc:'DPIA + Art.9 special-category basis + signage'};
  if(/\busa\b|united states|america|new york|\bny\b|florida|\bfl\b/.test(a)) return {juris:'United States', laws:['State biometric / FRT laws'], doc:'State FRT / biometric notice + consent'};
  return {juris:'Canada', laws:['PIPEDA'], doc:'PIPEDA PIA + signage'};
}

      '<div style="font-size:12px;color:#8a5d05;background:var(--wnbg);border:1px solid var(--wnbd);border-radius:8px;padding:8px 10px"><b>Vision prompt:</b> add <b>everyone</b> who was on the email with their title — so we know who supports the POC before it kicks off. Don\'t leave anyone out.</div>')+
    sec("Recommended solution &amp; equipment (from the discussion)",
      '<ul class="steps"><li><b>Solution:</b> AI Sentry + POS-integrated video (loss prevention + ops insight)</li><li><b>Equipment:</b> i3 AI server, 8× dome cameras, 1× LPR at the dock, i3Host analytics</li><li><b>Why:</b> matches "fewer systems" + "reporting managers will use" from the transcript.</li></ul>')+
    sec("Hand off to Project Management",
      '<span class="badge warn">Privacy &amp; cybersecurity review required first →</span> <button class="btn g sm" onclick="openStage(\'legal\')">Run Privacy &amp; Cybersecurity</button>'+

      '<div id="pmPanel"></div>')+
    saveBar("POC, stakeholders & equipment — proprietary to i3");
  },
  legal:function(){
    var L=window._pocLaw||lawFromAddress(rep.terr); var laws=L.laws;
    return sec("What applies (from the site address)",'<div><b>'+L.juris+'</b> &nbsp; '+laws.map(function(l){return '<span class="chip">'+l+'</span>'}).join('')+' <span class="badge hi">High risk — sensitive solutions</span></div>'+
      '<div style="margin-top:7px"><span class="badge warn">Exact legal doc</span> '+L.doc+'</div>')+
      sec("Decision",'Do <b>not</b> approve the POC until the i3 Privacy team signs off. Below is exactly what to do.')+
      sec("Do this — privacy",'<ol class="steps"><li>Get <b>express opt-in consent</b> for biometrics — signage alone is not enough.</li><li>Post the purpose-specific signage below (the generic version was rejected by the OPC).</li><li>Complete the PIA before final approval.</li></ol>')+
      sec("Do this — cybersecurity",'<ol class="steps"><li>Complete the i3 cybersecurity intake forms — network segmentation, open ports, remote access.</li><li>Keep the data in <b>Canada</b> (Canada-for-Canada); document any U.S. / cross-border support access.</li><li>Turn on access control + <b>MFA</b> on the i3Host / VMS accounts.</li><li>Encrypt data <b>at rest and in transit</b>.</li><li>Run the vendor security / <b>SOC 2</b> check and set retention to the minimum needed.</li></ol>')+
      sec("Post this signage",'<div class="doc">NOTICE — VIDEO MONITORING IN USE\n\nImages are monitored and recorded 24 hours a day for crime prevention, loss prevention and public safety.\n\nBiometric information is collected and used only for the stated purpose — not for marketing or demographics — and requires your consent.\n\nManaged by [Customer]. Privacy Office: privacy@[customer].ca</div>')+
      saveBar();

    var dl=val('i_deadline')||"30 days";

};
function assignPM(){              // PM assigned by territory
  var t=(rep.terr||'').toLowerCase();
  if(/quebec|québec/.test(t)) return "Nissan";
  if(/ontario|toronto/.test(t)) return "Louel";
  return "Des";                  // West / Atlantic-only / other
}
function showPM(){
  var pm=assignPM();

    '<div class="card" style="margin-top:12px"><div class="h"><div class="ic">🛠️</div><div><h2>PM Agent · '+pm+'</h2><div class="sub">Assigned PM keeps the build on track</div></div></div>'+
    '<div class="body"><div class="vsay"><div class="av">'+pm[0]+'</div><div class="bub">Hi '+rep.name.split(' ')[0]+', '+pm+' here from PM. POC received — I\'ll keep us on the timeline and make sure the data &amp; cybersecurity forms are complete.</div></div>'+

<script>
(function(){function fix(){var st=document.createElement("style");st.textContent=".i3lc{text-transform:none!important}";document.head.appendChild(st);var els=document.querySelectorAll("body *"),tg=[];for(var i=0;i<els.length;i++){var e=els[i];if(e.tagName==="SCRIPT"||e.tagName==="STYLE")continue;var t;try{t=getComputedStyle(e).textTransform;}catch(_){continue;}if(t!=="uppercase")continue;for(var c=e.firstChild;c;c=c.nextSibling){if(c.nodeType===3&&/i3/.test(c.nodeValue))tg.push(c);}}tg.forEach(function(n){var parts=n.nodeValue.split(/(i3[A-Za-z0-9]*)/g);if(parts.length<2)return;var f=document.createDocumentFragment();parts.forEach(function(p){if(/^i3[A-Za-z0-9]*$/.test(p)){var s=document.createElement("span");s.className="i3lc";s.textContent=p;f.appendChild(s);}else if(p)f.appendChild(document.createTextNode(p));});n.parentNode.replaceChild(f,n);});}if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",fix);else fix();})();
</script>
